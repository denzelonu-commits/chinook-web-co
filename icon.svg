<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Chinook Web Co.">
  <title>Chinook Web Co.</title>
  <defs>
    <!-- Mountain vertical gradient: lighter at peaks, deeper at base -->
    <linearGradient id="mtnG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Arc horizontal gradient: cyan across -->
    <linearGradient id="arcG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0891b2"/>
      <stop offset="50%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glowG" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card">
      <rect width="64" height="64" rx="13"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#0a0a0a"/>

  <g clip-path="url(#card)">
    <!-- Glow wash -->
    <rect width="64" height="64" fill="url(#glowG)"/>

    <!--
      W-mountain polygon
      Left outer peak  → (14, 19)   — top-left stroke of W
      Left valley      → (24, 37)   — first dip of W
      Centre peak      → (32, 23)   — middle hump of W
      Right valley     → (40, 37)   — second dip of W
      Right outer peak → (50, 19)   — top-right stroke of W
    -->
    <polygon
      points="5,57 14,19 24,37 32,23 40,37 50,19 59,57"
      fill="url(#mtnG)"
      opacity="0.95"
    />

    <!--
      Chinook arch — cubic bezier, apex ≈ y14, clears the peaks
      Starts/ends at y=43 (just above the mountain shoulders)
    -->
    <path
      d="M 5 43 C 5 4, 59 4, 59 43"
      stroke="url(#arcG)"
      stroke-width="4.5"
      fill="none"
      stroke-linecap="round"
    />
  </g>
</svg>
